databases:
  - name: storefront-db-new
    databaseName: storefront2
    user: storefront_user
    plan: free
    region: singapore

services:
  - type: web
    name: storefront-app
    env: python
    plan: free
    region: singapore
    buildCommand: "./build.sh"
    startCommand: "./startup.sh"
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: storefront-db-new
          property: connectionString
